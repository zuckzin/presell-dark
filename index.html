<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DarkFlix VIP</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: #080808;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    font-family: 'Inter', sans-serif;
  }

  @keyframes pulse-ring {
    0%, 100% { box-shadow: 0 0 0 0 rgba(204,26,26,0.65); }
    50%       { box-shadow: 0 0 0 12px rgba(204,26,26,0); }
  }
  .ring { animation: pulse-ring 2.5s ease-in-out infinite; }

  .container { width: 100%; max-width: 420px; text-align: center; }

  .logo-wrap { position: relative; width: 110px; height: 110px; margin: 0 auto 1.5rem; }
  .ring {
    position: absolute; inset: 0; border-radius: 50%;
    border: 2px solid #cc1a1a;
  }
  .logo-img {
    width: 100%; height: 100%; border-radius: 50%;
    object-fit: cover; border: 2px solid #1a0000;
  }
  .badge {
    position: absolute; bottom: 4px; right: 4px;
    background: #cc1a1a; border-radius: 50%;
    width: 22px; height: 22px; display: flex;
    align-items: center; justify-content: center;
  }

  h1 { font-size: 26px; font-weight: 900; color: #fff; letter-spacing: 1px; margin-bottom: 4px; }
  h1 span { color: #cc1a1a; }
  .handle { color: #555; font-size: 13px; margin-bottom: 1.5rem; }

  .divider { width: 36px; height: 1px; background: #cc1a1a; margin: 0 auto 1.4rem; opacity: 0.6; }

  .desc { color: #bbb; font-size: 14px; line-height: 1.7; margin-bottom: 1.4rem; }
  .desc strong { color: #fff; font-weight: 600; }

  .pills { display: flex; gap: 8px; justify-content: center; margin-bottom: 2rem; flex-wrap: wrap; }
  .pill {
    border-radius: 20px; padding: 5px 12px; font-size: 11px;
    background: #111; border: 0.5px solid #2a2a2a; color: #888;
  }
  .pill.hot {
    background: #1a0808; border: 0.5px solid #3a1010; color: #cc1a1a; font-weight: 600;
  }

  .slider-wrap {
    position: relative; background: #1a0606;
    border: 1px solid #3a0f0f; border-radius: 50px;
    height: 58px; display: flex; align-items: center;
    padding: 0 8px; overflow: hidden; margin-bottom: 10px;
    user-select: none;
  }
  .fill {
    position: absolute; left: 8px; top: 8px; bottom: 8px;
    width: 48px;
    background: rgba(204,26,26,0.15);
    border-radius: 40px;
    transition: width 0.35s cubic-bezier(.4,0,.2,1);
    pointer-events: none;
  }
  .thumb {
    position: relative; z-index: 2;
    width: 48px; height: 44px;
    background: #cc1a1a;
    border-radius: 40px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    cursor: grab;
    transform: translateX(0px);
    transition: transform 0.35s cubic-bezier(.4,0,.2,1), background 0.3s;
  }
  .thumb:active { cursor: grabbing; }
  .label {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700;
    color: rgba(255,255,255,1);
    letter-spacing: 0.5px; pointer-events: none;
  }

  .hint { color: #3a3a3a; font-size: 11px; margin-bottom: 2rem; }

  footer {
    color: #2a2a2a; font-size: 11px;
    border-top: 0.5px solid #1a1a1a; padding-top: 1.25rem;
  }
</style>
</head>

DLgsrccbZWEpU4QVEYHMgClLWncJjJZGtJBUNSiptsk/VFMdT76XHGeIHkNxScbn30rdFA4km6//9k=";

  document.getElementById('logo-img').src = LOGO;

  const wrap  = document.getElementById('wrap');
  const thumb = document.getElementById('thumb');
  const fill  = document.getElementById('fill');
  const label = document.getElementById('label');

  const arrowSVG = `<svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6z"/></svg>`;
  const checkSVG = `<svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>`;

  let pos = 0, maxX = 0, done = false, dragging = false, startX = 0;

  function calcMax() {
    maxX = wrap.offsetWidth - thumb.offsetWidth - 16;
  }
  calcMax();
  window.addEventListener('resize', calcMax);

  function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
  function getX(e) { return e.touches ? e.touches[0].clientX : e.clientX; }

  function render() {
    thumb.style.transition = dragging ? 'none' : 'transform 0.35s cubic-bezier(.4,0,.2,1), background 0.3s';
    thumb.style.transform = `translateX(${pos}px)`;
    thumb.style.background = done ? '#2ecc71' : '#cc1a1a';
    thumb.innerHTML = done ? checkSVG : arrowSVG;

    fill.style.transition = dragging ? 'none' : 'width 0.35s cubic-bezier(.4,0,.2,1)';
    fill.style.width = (pos + 48) + 'px';
    fill.style.background = done ? 'rgba(46,204,113,0.18)' : 'rgba(204,26,26,0.15)';

    const ratio = maxX > 0 ? pos / maxX : 0;
    const textOpacity = Math.max(0, 1 - ratio * 1.8);
    label.style.color = `rgba(255,255,255,${textOpacity})`;
  }

  function onStart(e) {
    if (done) return;
    dragging = true;
    startX = getX(e) - pos;
  }
  function onMove(e) {
    if (!dragging || done) return;
    pos = clamp(getX(e) - startX, 0, maxX);
    render();
  }
  function onEnd() {
    if (!dragging || done) return;
    dragging = false;
    if (pos >= maxX * 0.88) {
      done = true;
      pos = maxX;
      render();
      setTimeout(() => window.open(BOT_URL, '_blank'), 500);
    } else {
      pos = 0;
      render();
    }
  }

  thumb.addEventListener('mousedown', onStart);
  thumb.addEventListener('touchstart', onStart, { passive: true });
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onEnd);
  document.addEventListener('touchmove', (e) => { if (dragging) e.preventDefault(); onMove(e); }, { passive: false });
  document.addEventListener('touchend', onEnd);

  render();
</script>
